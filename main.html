<!DOCTYPE html>
<html>
<head>
<style>
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
}

/* Left Image */
.hero img {
    width: 65%;
    height: 100%;
    object-fit: cover;
}

/* Right Content */
.content {
    width: 35%;
    padding: 40px;
    text-align: center;
}

.content h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.content p {
    color: gray;
    margin-bottom: 20px;
}

/* Button */
.content a {
    padding: 10px 20px;
    background-color: red;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="hero">
    
    <!-- Image -->
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="nature">

    <!-- Content -->
    <div class="content">
        <h1>Welcome to my Pinterest clone</h1>
        <p>Discover new inspiration and save your favorite ideas</p>
        <a href="#">Explore now</a>
    </div>

</div>

</body>
</html>
